<svg viewBox="0 0 860 348" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, Segoe UI, Roboto, sans-serif">
  <rect x="0" y="0" width="860" height="348" rx="10" fill="#14130f"/>
  <text x="20" y="30" font-size="17" font-weight="700" fill="#ece7da">DeckBuilder — a sample optimized deck plan</text>

  <!-- deck outline -->
  <rect x="16" y="46" width="828" height="256" fill="none" stroke="#36322a"/>

  <!-- plank rows -->
  <g stroke="#5a4628" stroke-width="0.8">
    <rect x="20" y="50" width="820" height="26" fill="#9c7c4d"/>
    <rect x="20" y="78" width="820" height="26" fill="#876a40"/>
    <rect x="20" y="106" width="820" height="26" fill="#9c7c4d"/>
    <rect x="20" y="134" width="820" height="26" fill="#876a40"/>
    <rect x="20" y="162" width="820" height="26" fill="#9c7c4d"/>
    <rect x="20" y="190" width="820" height="26" fill="#876a40"/>
    <rect x="20" y="218" width="820" height="26" fill="#9c7c4d"/>
    <rect x="20" y="246" width="820" height="26" fill="#876a40"/>
    <rect x="20" y="274" width="820" height="26" fill="#9c7c4d"/>
  </g>

  <!-- backing boards (joists) -->
  <g stroke="#79b6c9" stroke-width="1.4" stroke-dasharray="7 5" stroke-opacity="0.9">
    <line x1="60" y1="46" x2="60" y2="302"/>
    <line x1="142" y1="46" x2="142" y2="302"/>
    <line x1="224" y1="46" x2="224" y2="302"/>
    <line x1="306" y1="46" x2="306" y2="302"/>
    <line x1="388" y1="46" x2="388" y2="302"/>
    <line x1="470" y1="46" x2="470" y2="302"/>
    <line x1="552" y1="46" x2="552" y2="302"/>
    <line x1="634" y1="46" x2="634" y2="302"/>
    <line x1="716" y1="46" x2="716" y2="302"/>
    <line x1="798" y1="46" x2="798" y2="302"/>
  </g>
  <g fill="#a7d6e6">
    <circle cx="60" cy="46" r="2.4"/><circle cx="60" cy="302" r="2.4"/>
    <circle cx="142" cy="46" r="2.4"/><circle cx="142" cy="302" r="2.4"/>
    <circle cx="224" cy="46" r="2.4"/><circle cx="224" cy="302" r="2.4"/>
    <circle cx="306" cy="46" r="2.4"/><circle cx="306" cy="302" r="2.4"/>
    <circle cx="388" cy="46" r="2.4"/><circle cx="388" cy="302" r="2.4"/>
    <circle cx="470" cy="46" r="2.4"/><circle cx="470" cy="302" r="2.4"/>
    <circle cx="552" cy="46" r="2.4"/><circle cx="552" cy="302" r="2.4"/>
    <circle cx="634" cy="46" r="2.4"/><circle cx="634" cy="302" r="2.4"/>
    <circle cx="716" cy="46" r="2.4"/><circle cx="716" cy="302" r="2.4"/>
    <circle cx="798" cy="46" r="2.4"/><circle cx="798" cy="302" r="2.4"/>
  </g>

  <!-- seams (butt joints) — staggered, always on a joist -->
  <g fill="#ff2b2b">
    <rect x="304.25" y="51" width="3.5" height="24"/><rect x="550.25" y="51" width="3.5" height="24"/>
    <rect x="140.25" y="79" width="3.5" height="24"/><rect x="468.25" y="79" width="3.5" height="24"/><rect x="714.25" y="79" width="3.5" height="24"/>
    <rect x="386.25" y="107" width="3.5" height="24"/><rect x="632.25" y="107" width="3.5" height="24"/>
    <rect x="222.25" y="135" width="3.5" height="24"/><rect x="550.25" y="135" width="3.5" height="24"/>
    <rect x="386.25" y="163" width="3.5" height="24"/><rect x="714.25" y="163" width="3.5" height="24"/>
    <rect x="140.25" y="191" width="3.5" height="24"/><rect x="468.25" y="191" width="3.5" height="24"/>
    <rect x="304.25" y="219" width="3.5" height="24"/><rect x="632.25" y="219" width="3.5" height="24"/>
    <rect x="222.25" y="247" width="3.5" height="24"/><rect x="550.25" y="247" width="3.5" height="24"/>
    <rect x="386.25" y="275" width="3.5" height="24"/><rect x="714.25" y="275" width="3.5" height="24"/>
  </g>

  <!-- legend -->
  <g font-size="12.5" fill="#9a9483">
    <rect x="20" y="322" width="14" height="10" fill="#9c7c4d" stroke="#5a4628" stroke-width="0.8"/>
    <text x="40" y="331">plank</text>
    <rect x="92" y="322" width="4" height="10" fill="#ff2b2b"/>
    <text x="104" y="331">seam (on joist)</text>
    <line x1="222" y1="327" x2="240" y2="327" stroke="#79b6c9" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="246" y="331">backing board</text>
  </g>
</svg>
