name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - name: Install SDK packages (Android 15)
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - run: npm ci
      - run: npm run build
      - run: npx cap sync android
      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: DeckBuilder-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: DeckBuilder-windows-zip
          path: release/*.zip

  # On a version tag (vX.Y.Z), publish a GitHub Release with the built binaries.
  release:
    needs: [android, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # for the release body
      - uses: actions/download-artifact@v4
        with:
          name: DeckBuilder-android-apk
          path: dl
      - uses: actions/download-artifact@v4
        with:
          name: DeckBuilder-windows-zip
          path: dl
      - name: Name the APK after the tag
        run: mv dl/app-debug.apk "dl/DeckBuilder-${{ github.ref_name }}.apk"
      - uses: softprops/action-gh-release@v2
        with:
          body_path: .github/RELEASE_BODY.md
          append_body: true # install guide above, auto-generated changelog below
          generate_release_notes: true
          files: |
            dl/DeckBuilder-${{ github.ref_name }}.apk
            dl/*.zip
