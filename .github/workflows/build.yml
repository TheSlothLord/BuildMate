name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: dist

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v4
      - name: Install SDK packages (Android 15)
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - run: npm ci
      - run: npm run build
      - run: npx cap sync android
      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: BuildMate-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v7
        with:
          name: BuildMate-windows-zip
          path: release/*.zip

  # On a version tag (vX.Y.Z): publish a GitHub Release with the built binaries +
  # the web bundle, then tell Vector to deploy this exact version. A plain push to
  # main just runs the build jobs above (CI) — no release, no deploy.
  release:
    needs: [web, android, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # for the release body
      - uses: actions/download-artifact@v8
        with:
          name: BuildMate-android-apk
          path: dl
      - uses: actions/download-artifact@v8
        with:
          name: BuildMate-windows-zip
          path: dl
      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web
      - name: Name the APK after the tag
        run: mv dl/app-debug.apk "dl/BuildMate-${{ github.ref_name }}.apk"
      - name: Bundle the web build for Vector
        run: tar czf dl/web-dist.tar.gz -C web .
      - uses: softprops/action-gh-release@v3
        with:
          body_path: .github/RELEASE_BODY.md
          append_body: true # install guide above, auto-generated changelog below
          generate_release_notes: true
          files: |
            dl/BuildMate-${{ github.ref_name }}.apk
            dl/*.zip
            dl/web-dist.tar.gz
      - name: Tell Vector to deploy this version
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/TheSlothLord/Vector/dispatches \
            -d '{"event_type":"deploy-buildmate","client_payload":{"ref":"${{ github.ref_name }}"}}'
