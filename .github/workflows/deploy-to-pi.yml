name: deploy-to-pi
# After the `build` workflow succeeds on main, tell the Vector runner (on the home
# server) to pull the fresh web-dist artifact and redeploy.
on:
  workflow_run:
    workflows: ["build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
jobs:
  notify:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Tell Vector to deploy BuildMate
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: gh api -X POST repos/TheSlothLord/Vector/dispatches -f event_type=deploy-buildmate
